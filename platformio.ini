[platformio]
default_envs = uno

; --- AMBIENTE TRANSMISSOR (ARDUINO UNO) ---
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
; O SEGREDO ESTÁ AQUI EMBAIXO:
build_src_filter = +<Transmissor/> -<Receptor/>
lib_deps =
    nrf24/RF24
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor

; --- AMBIENTE RECEPTOR (ESP32) ---
; --- AMBIENTE RECEPTOR (ESP8266) ---
[env:esp8266]
platform = espressif8266
board = nodemcuv2 ; Se for o NodeMCU V2. Se for o D1 Mini, use 'd1_mini'
framework = arduino
monitor_speed = 115200
; O filtro continua igual:
build_src_filter = +<Receptor/> -<Transmissor/>
lib_deps =
    nrf24/RF24